<!DOCTYPE html>
<html>
<head>
  <title>GmailCleaner — Signing in…</title>
  <style>
    body { font-family: sans-serif; background: #080810; color: #ededf5;
           display: flex; align-items: center; justify-content: center;
           height: 100vh; margin: 0; text-align: center; }
    p { font-size: 15px; opacity: .7; }
  </style>
</head>
<body>
  <p>Signing in… this window will close automatically.</p>
  <script>
    var hash   = new URLSearchParams(window.location.hash.replace('#', ''));
    var params = new URLSearchParams(window.location.search);
    var token  = hash.get('access_token');
    var error  = params.get('error') || hash.get('error');
    if (window.opener) {
      window.opener.postMessage(
        { type: 'GMAIL_OAUTH_CALLBACK', token: token, error: error },
        '*'
      );
      setTimeout(function () { window.close(); }, 800);
    }
  </script>
</body>
</html>
